<!DOCTYPE html>
<html>
<head>
  <title>Dashwise</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
      background: #0f0f13;
      color: #e8e8ed;
    }
    .loading-cover {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #6c5ce7;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 2s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading-cover">
    <div class="spinner"></div>
    <p>Opening Dashwise...</p>
  </div>
  <script src="newtab.js"></script>
</body>
</html>
