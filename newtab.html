<!DOCTYPE html>
<html>
<head>
  <title>Dashwise</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
      background: #fdfdfd;
    }
    div#loading-cover {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 2s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      position: absolute;
      top: 0;
      left: 0;
      display: none;
    }
    body.loaded #loading-cover {
      display: none;
    }
    body.loaded iframe {
      display: block;
    }
  </style>
</head>
<body>
  <div id="loading-cover">
    <div class="spinner"></div>
    <p>Loading your custom URL...</p>
  </div>
  <iframe id="content-frame"></iframe>
  <script src="newtab.js"></script>
</body>
</html>
