<!DOCTYPE html>
<html>
<head>
  <title>Dashwise</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
      background: #0f0f13;
      color: #e8e8ed;
    }
    div#loading-cover {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #6c5ce7;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 2s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      position: absolute;
      top: 0;
      left: 0;
      display: none;
    }
    .fallback button {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      background: rgba(15,15,19,0.78);
      color: #fff;
      cursor: pointer;
      font: inherit;
      padding: 9px 14px;
      backdrop-filter: blur(12px);
    }
    .fallback {
      display: none;
      max-width: 460px;
      text-align: center;
      line-height: 1.5;
    }
    body.frame-failed .fallback { display: block; }
    body.frame-failed #loading-cover { display: none; }
    body.loaded #loading-cover {
      display: none;
    }
    body.loaded iframe {
      display: block;
    }
  </style>
</head>
<body>
  <div id="loading-cover">
    <div class="spinner"></div>
    <p>Loading Dashwise...</p>
  </div>
  <div id="fallback" class="fallback">
    <h1>Dashwise is ready</h1>
    <p id="fallback-message">This Dashwise server cannot be embedded in the new tab page.</p>
  </div>
  <iframe id="content-frame"></iframe>
  <script src="newtab.js"></script>
</body>
</html>
