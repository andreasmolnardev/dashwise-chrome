<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Dashwise</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #e8e8ed;
      --text-secondary: #90909a;
      --primary: #6c5ce7;
      --primary-hover: #7c6cf7;
      --danger: #e74c3c;
      --radius: 12px;
      --radius-sm: 8px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 360px;
      min-height: 400px;
      font-size: 14px;
      line-height: 1.4;
    }
    .screen { display: none; padding: 16px; }
    .screen.active { display: block; }

    /* ---- Login ---- */
    #screen-login {
      display: none;
      flex-direction: column;
      gap: 12px;
      padding-top: 32px;
    }
    #screen-login.active { display: flex; }
    .login-logo {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      margin: 0 auto 8px;
    }
    .login-title {
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--primary); }
    .field input::placeholder { color: var(--text-secondary); opacity: 0.5; }

    /* ---- Buttons ---- */
    .btn {
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
    .btn-ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { background: var(--surface); }
    .btn-danger {
      background: var(--danger);
      color: #fff;
    }
    .btn-danger:hover:not(:disabled) { opacity: 0.85; }
    .btn-icon {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      border-radius: 50%;
      transition: background 0.2s, color 0.2s;
    }
    .btn-icon:hover { background: var(--surface); color: var(--text); }

    .error { color: var(--danger); font-size: 12px; min-height: 16px; }
    .success { color: #2ecc71; font-size: 12px; min-height: 16px; }
    .hidden { display: none !important; }

    /* ---- Header ---- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .header-logo {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }
    .header-time {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .header-settings svg { width: 20px; height: 20px; }

    /* ---- Section ---- */
    .section { margin-bottom: 16px; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    /* ---- Action List ---- */
    .action-list { display: flex; flex-direction: column; gap: 4px; }
    .action-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.2s;
      font-size: 13px;
    }
    .action-item:hover { background: rgba(255,255,255,0.08); }
    .action-item svg { width: 16px; height: 16px; flex-shrink: 0; color: var(--primary); }

    /* ---- Notification Cards ---- */
    .notif-list { display: flex; flex-direction: column; gap: 6px; }
    .notif-empty {
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
      padding: 16px 0;
    }
    .notif-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
    }
    .notif-card-title {
      font-weight: 500;
      font-size: 13px;
      margin-bottom: 2px;
    }
    .notif-card-message {
      font-size: 12px;
      color: var(--text-secondary);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .notif-card-time {
      font-size: 11px;
      color: var(--text-secondary);
      opacity: 0.7;
      margin-top: 4px;
    }

    /* ---- Settings ---- */
    #screen-settings.active {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .settings-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .settings-header h2 { font-size: 16px; font-weight: 600; }
    .settings-back {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .settings-back:hover { background: var(--surface); color: var(--text); }
    .settings-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .settings-row label {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .settings-row input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .settings-row input:focus { border-color: var(--primary); }
    .settings-actions { display: flex; gap: 8px; margin-top: 4px; }
    .settings-actions .btn { flex: 1; }

    /* ---- Add Link ---- */
    #screen-add-link.active { display: block; }
    #screen-add-link .field + .field { margin-top: 0; }
    select { font-family: inherit; }
    select option { background: #1a1a24; color: #e8e8ed; }

    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 16px;
      font-size: 12px;
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div id="screen-login" class="screen">
    <img src="assets/dashwise.png" alt="Dashwise" class="login-logo">
    <div class="login-title">Dashwise</div>
    <div class="field">
      <label>Server URL</label>
      <input type="url" id="server-url" placeholder="https://dashwise.example.com">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password">
    </div>
    <div id="login-error" class="error"></div>
    <button id="login-btn" class="btn btn-primary">Sign In</button>
  </div>

  <!-- Main Screen -->
  <div id="screen-main" class="screen">
    <div class="header">
      <img src="assets/dashwise.png" alt="Dashwise" class="header-logo">
      <span class="header-time" id="current-time"></span>
      <button id="settings-btn" class="btn-icon header-settings" title="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
          <path d="M0 0h24v24H0z" fill="none" />
          <path fill="currentColor" d="M12 15.5A3.5 3.5 0 0 1 8.5 12A3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5a3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97s-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.06-.73-1.69-.98l-.37-2.65A.506.506 0 0 0 14 2h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1s.03.65.07.97l-2.11 1.66c-.19.15-.25.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.06.74 1.69.99l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.26 1.17-.59 1.69-.99l2.49 1.01c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64z" />
        </svg>
      </button>
    </div>

    <div class="section">
      <div class="section-title">Link Actions</div>
      <div class="action-list">
        <div class="action-item" id="action-home-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Add to Home Links
        </div>
        <div class="action-item" id="action-add-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          Add to Links
        </div>
        <div class="action-item" id="action-read-later">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          Save to Read Later
        </div>
        <div class="action-item" id="action-qr">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Generate QR Code
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Notifications</div>
      <div id="notif-list" class="notif-list">
        <div class="notif-empty">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Settings Screen -->
  <div id="screen-settings" class="screen">
    <div class="settings-header">
      <button id="settings-back" class="settings-back">&larr;</button>
      <h2>Settings</h2>
    </div>
    <div class="settings-row">
      <label>New Tab URL</label>
      <input type="url" id="new-tab-url" placeholder="https://example.com">
    </div>
    <div id="settings-status" class="success" style="min-height:0;"></div>
    <div class="settings-actions">
      <button id="save-url-btn" class="btn btn-primary">Save</button>
      <button id="logout-btn" class="btn btn-danger">Log Out</button>
    </div>
  </div>

  <!-- Add Link Screen -->
  <div id="screen-add-link" class="screen">
    <div class="settings-header" style="margin-bottom:12px;">
      <button id="add-link-back" class="settings-back">&larr;</button>
      <h2>Add Link</h2>
    </div>

    <div style="display:flex;flex-direction:column;gap:10px;">
      <div class="field">
        <label>Name</label>
        <input type="text" id="add-name" placeholder="Link title">
      </div>
      <div class="field">
        <label>URL</label>
        <input type="url" id="add-url" placeholder="https://example.com">
      </div>
      <div class="field">
        <label>Icon</label>
        <div style="display:flex;gap:6px;">
          <input type="text" id="add-icon" placeholder="Icon URL (auto-detected)" style="flex:1;">
          <button id="add-icon-detect" class="btn btn-ghost" style="flex-shrink:0;padding:10px;" title="Auto-detect icon">&olarr;</button>
        </div>
        <div id="add-icon-preview" style="margin-top:4px;min-height:24px;"></div>
      </div>
      <div class="field">
        <label>Collection</label>
        <select id="add-collection" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:14px;outline:none;appearance:auto;">
          <option value="">None</option>
        </select>
      </div>
      <div class="field">
        <label>Tags (comma separated)</label>
        <input type="text" id="add-tags" placeholder="tag1, tag2, tag3">
      </div>
      <div id="add-link-error" class="error"></div>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button id="add-link-cancel" class="btn btn-ghost" style="flex:1;">Cancel</button>
        <button id="add-link-save" class="btn btn-primary" style="flex:1;">Save Link</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
