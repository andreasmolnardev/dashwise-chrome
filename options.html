<!DOCTYPE html>
<html>
<head>
  <title>Dashwise Options</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f13;
      color: #e8e8ed;
      padding: 24px;
      max-width: 480px;
      margin: 0 auto;
      font-size: 14px;
    }
    h1 { font-size: 20px; margin-bottom: 20px; }
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12px;
      color: #90909a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #e8e8ed;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: #6c5ce7; }
    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary { background: #6c5ce7; color: #fff; }
    .btn-primary:hover { background: #7c6cf7; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-danger:hover { opacity: 0.85; }
    #status { margin-top: 10px; color: #2ecc71; font-size: 13px; min-height: 20px; }
    hr { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 24px 0; }
    .info { font-size: 12px; color: #90909a; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h1>Dashwise Settings</h1>
  <div class="field">
    <label>New Tab URL</label>
    <input type="url" id="new-tab-url" placeholder="https://example.com">
  </div>
  <button id="save" class="btn btn-primary">Save URL</button>
  <div id="status"></div>

  <hr>

  <div class="info">
    Signed in with token. Use the popup to log in or manage your Dashwise server connection.
  </div>
  <button id="logout-btn" class="btn btn-danger">Log Out</button>
  <div id="logout-status"></div>

  <hr>

  <div class="field">
    <label>Session Token</label>
    <div class="info" style="margin-bottom:4px;">
      Pull <code>pb_token</code> from localStorage of an open Dashwise tab.
    </div>
    <button id="refresh-token-btn" class="btn btn-primary">Refresh Token</button>
    <div id="refresh-token-status" style="margin-top:10px;color:#2ecc71;font-size:13px;min-height:20px;"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
